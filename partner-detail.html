<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEADTENDER — Партнёр</title>
  <meta name="description" content="Информация о партнёре LEADTENDER">
  <meta property="og:type" content="website">
  <link rel="icon" href="image/short-logo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/animations.css?v=2">

  <style>
    .partner-page-header {
      padding: 92px 0 32px;
      background: var(--color-bg);
    }

    /* === PARTNER HEADER === */
    .partner-hero {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 36px;
    }
    .partner-hero-avatar {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }
    .partner-hero-info {
      min-width: 0;
    }
    .partner-hero-name {
      font-size: 32px;
      font-weight: 800;
      color: var(--color-text-primary);
      line-height: 1.2;
    }
    .partner-hero-sub {
      font-size: 16px;
      color: var(--color-text-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .partner-hero-location {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .partner-hero-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-primary);
      background: var(--color-primary-light);
      border-radius: 50px;
    }

    /* === DESCRIPTION === */
    .partner-about {
      display: grid;
      grid-template-columns: 1fr 520px;
      gap: 36px;
      align-items: start;
      margin-bottom: 48px;
    }
    .partner-desc {
      font-size: 16px;
      color: var(--color-text-body);
      line-height: 1.8;
    }
    .partner-desc p {
      margin-bottom: 16px;
    }
    .partner-about-img {
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--color-border-light);
    }
    .partner-about-img img {
      width: 100%;
      height: auto;
      display: block;
    }
    .partner-catalog-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: var(--color-primary);
      border: 1.5px solid var(--color-primary);
      border-radius: 50px;
      background: none;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .partner-catalog-btn:hover {
      background: var(--color-primary);
      color: #fff;
    }
    @media (max-width: 768px) {
      .partner-about {
        grid-template-columns: 1fr;
        gap: 24px;
      }
    }

    /* === WEBSITE LINK === */
    .partner-website {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--color-primary);
      text-decoration: none;
      padding: 12px 24px;
      border: 1.5px solid var(--color-primary);
      border-radius: 50px;
      transition: all var(--transition-fast);
      margin-bottom: 48px;
    }
    .partner-website:hover {
      background: var(--color-primary);
      color: white;
    }

    /* === PRODUCTS SECTION === */
    .partner-products-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 24px;
    }
    .partner-products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 48px;
    }
    .partner-product-card {
      background: var(--color-bg-white);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform var(--transition-base), box-shadow var(--transition-base);
    }
    .partner-product-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-card-hover);
    }
    .partner-product-card-img {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .partner-product-card-img svg {
      color: rgba(255,255,255,0.2);
    }
    .partner-product-card-body {
      padding: 14px 18px 18px;
    }
    .partner-product-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.4;
      transition: color var(--transition-fast);
    }
    .partner-product-card:hover .partner-product-card-name {
      color: var(--color-primary);
    }

    /* === CTA === */
    .partner-cta {
      background: var(--color-bg);
      border-radius: var(--radius-xl);
      padding: 40px;
      text-align: center;
    }
    .partner-cta p {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 16px;
    }
    .partner-cta span {
      font-size: 15px;
      color: var(--color-text-muted);
      display: block;
      margin-bottom: 24px;
    }

    /* === CERTIFICATES === */
    .partner-certs-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 24px;
    }
    .partner-certs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 48px;
    }
    .partner-cert-card {
      background: var(--color-bg-white);
      border: 1px solid var(--color-border-light);
      border-radius: 14px;
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      transition: transform var(--transition-base), box-shadow var(--transition-base);
      position: relative;
      overflow: hidden;
    }
    .partner-cert-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .partner-cert-card.cert-green::before { background: #16A34A; }
    .partner-cert-card.cert-blue::before { background: #2563EB; }
    .partner-cert-card.cert-amber::before { background: #D97706; }
    .partner-cert-card.cert-slate::before { background: #64748B; }
    .partner-cert-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-card-hover);
    }
    .partner-cert-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .partner-cert-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .partner-cert-icon.icon-green { background: #F0FDF4; color: #16A34A; }
    .partner-cert-icon.icon-blue { background: #EFF6FF; color: #2563EB; }
    .partner-cert-icon.icon-amber { background: #FFFBEB; color: #D97706; }
    .partner-cert-icon.icon-slate { background: #F1F5F9; color: #64748B; }
    .partner-cert-date {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .partner-cert-date.date-green { background: #F0FDF4; color: #16A34A; }
    .partner-cert-date.date-blue { background: #EFF6FF; color: #2563EB; }
    .partner-cert-date.date-amber { background: #FFFBEB; color: #D97706; }
    .partner-cert-date.date-slate { background: #F1F5F9; color: #64748B; }
    .partner-cert-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--color-text-primary);
      line-height: 1.2;
    }
    .partner-cert-desc {
      font-size: 13px;
      color: var(--color-text-muted);
      line-height: 1.5;
    }
    .partner-cert-images {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 48px;
    }
    .partner-cert-img-wrap {
      border: 1px solid var(--color-border-light);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition-base), box-shadow var(--transition-base);
    }
    .partner-cert-img-wrap:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-card-hover);
    }
    .partner-cert-img-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }
    .cert-label {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-muted);
      padding: 8px 0 0;
    }
    /* Fullscreen overlay */
    .cert-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .cert-overlay.active { display: flex; }
    .cert-overlay img {
      max-width: 92%;
      max-height: 92%;
      border-radius: 8px;
      object-fit: contain;
    }
    @media (max-width: 768px) {
      .partner-certs-grid { grid-template-columns: repeat(2, 1fr); }
      .partner-cert-images { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .partner-certs-grid { grid-template-columns: 1fr; }
      .partner-cert-images { grid-template-columns: 1fr; }
    }

    /* === NOT FOUND === */
    .partner-not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .partner-not-found svg {
      color: var(--color-text-muted);
      margin-bottom: 16px;
    }
    .partner-not-found p {
      font-size: 18px;
      color: var(--color-text-muted);
      margin-bottom: 24px;
    }

    @media (max-width: 1024px) {
      .partner-products-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .partner-hero { flex-direction: column; align-items: flex-start; gap: 16px; }
      .partner-hero-name { font-size: 26px; }
      .partner-products-grid { grid-template-columns: repeat(2, 1fr); }
      .partner-about { grid-template-columns: 1fr; }
      .partner-about-img { max-width: 100%; }
      .partner-desc { font-size: 15px; }
      .partner-certs-title { font-size: 20px; }
      .partner-cert-name { font-size: 14px; }
      .partner-cert-desc { font-size: 12px; }
      .partner-cta { padding: 32px 20px; }
      .partner-cta p { font-size: 16px; }
    }
    @media (max-width: 480px) {
      .partner-products-grid { grid-template-columns: 1fr; }
      .partner-hero-name { font-size: 22px; }
      .partner-cert-card { padding: 20px 16px 16px; }
      .partner-cert-images { grid-template-columns: 1fr; }
      .cert-label { font-size: 11px; }
    }
  </style>
</head>
<body>

  <div class="scroll-progress" id="scroll-progress"></div>
  <div id="header" data-header-style="solid"></div>

  <div class="partner-page-header">
    <div class="container">
      <nav class="breadcrumbs" id="partner-breadcrumbs" aria-label="Навигация">
        <a href="index.html">Главная</a>
        <span class="separator">/</span>
        <a href="partners.html">Партнёры</a>
        <span class="separator">/</span>
        <span class="current" id="bc-title">Загрузка...</span>
      </nav>
    </div>
  </div>

  <section class="section" style="padding-top: 0;">
    <div class="container" id="partner-content">
      <!-- Rendered by JS -->
    </div>
  </section>

  <div id="footer"></div>

  <button class="back-to-top" id="back-to-top" aria-label="Наверх">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>

  <script>
    var PARTNER_COLORS = {
      'bkh': '#DC2626', 'interskol': '#2563EB', 'zubr': '#059669',
      'krepex': '#475569', 'sts': '#D97706', 'resanta': '#7C3AED'
    };
    var GRADIENTS = {
      'abrasive': 'linear-gradient(135deg, #DC2626, #991B1B)',
      'power': 'linear-gradient(135deg, #2563EB, #1E40AF)',
      'hand': 'linear-gradient(135deg, #059669, #047857)',
      'fasteners': 'linear-gradient(135deg, #475569, #334155)',
      'safety': 'linear-gradient(135deg, #D97706, #B45309)',
      'welding': 'linear-gradient(135deg, #1E293B, #0F172A)'
    };
    var CAT_ICONS_SM = {
      'abrasive': '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>',
      'power': '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
      'hand': '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
      'fasteners': '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>',
      'safety': '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
      'welding': '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>'
    };

    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      var partner = PARTNERS.find(function(p) { return p.id === id; });
      var container = document.getElementById('partner-content');
      var bcTitle = document.getElementById('bc-title');

      if (!partner) {
        bcTitle.textContent = 'Не найдено';
        container.innerHTML =
          '<div class="partner-not-found">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>' +
            '<p>Партнёр не найден</p>' +
            '<a href="partners.html" class="btn btn-primary">Все партнёры</a>' +
          '</div>';
        return;
      }

      document.title = 'LEADTENDER — ' + partner.name;
      bcTitle.textContent = partner.name;

      var color = PARTNER_COLORS[partner.id] || '#94A3B8';
      var initial = partner.name.charAt(0);

      // Description paragraphs
      var descHTML = '';
      if (partner.description) {
        var paragraphs = partner.description.split('\n\n');
        paragraphs.forEach(function(p) {
          descHTML += '<p>' + p + '</p>';
        });
      }

      // Website link
      var websiteHTML = '';
      if (partner.website) {
        websiteHTML =
          '<a href="' + partner.website + '" target="_blank" rel="noopener" class="partner-website">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
            'Перейти на сайт производителя' +
          '</a>';
      }

      // Badge
      var badgeHTML = partner.badge ? '<span class="partner-hero-badge">' + partner.badge + '</span>' : '';

      // Products of this partner
      var products = PRODUCTS.filter(function(p) { return p.manufacturer === partner.id; });
      var productsHTML = '';
      if (products.length > 0) {
        var cardsHTML = '';
        products.forEach(function(p) {
          var imgContent = p.image
            ? '<img src="' + p.image + '" alt="' + p.name + '" style="width:100%; height:100%; object-fit:cover;">'
            : (CAT_ICONS_SM[p.catParent] || CAT_ICONS_SM['abrasive']);
          cardsHTML +=
            '<a href="product.html?id=' + p.id + '" class="partner-product-card">' +
              '<div class="partner-product-card-img">' + imgContent + '</div>' +
              '<div class="partner-product-card-body">' +
                '<div class="partner-product-card-name">' + p.name + '</div>' +
              '</div>' +
            '</a>';
        });
        productsHTML =
          '<div class="partner-products-title">Продукция ' + partner.name + '</div>' +
          '<div class="partner-products-grid">' + cardsHTML + '</div>';
      }

      // Certificates block (only for BKH)
      var certsHTML = '';
      if (partner.id === 'bkh') {
        var shieldIcon = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';
        var checkIcon = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
        var starIcon = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';

        certsHTML =
          '<div class="partner-certs-title" id="certs">Сертификаты и испытания</div>' +
          '<div class="partner-certs-grid">' +

            '<div class="partner-cert-card cert-slate">' +
              '<div class="partner-cert-top">' +
                '<div class="partner-cert-icon icon-slate">' + shieldIcon + '</div>' +
                '<span class="partner-cert-date date-slate">тест от 07.11.2024</span>' +
              '</div>' +
              '<div class="partner-cert-name">EN 12413:2019</div>' +
              '<div class="partner-cert-desc">Протокол испытаний MPA Hannover (Германия). Тест на разрыв пройден.</div>' +
            '</div>' +

            '<div class="partner-cert-card cert-slate">' +
              '<div class="partner-cert-top">' +
                '<div class="partner-cert-icon icon-slate"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg></div>' +
                '<span class="partner-cert-date date-slate">до 08.03.2031</span>' +
              '</div>' +
              '<div class="partner-cert-name">ТР ТС 010/2011</div>' +
              '<div class="partner-cert-desc">Декларация соответствия ЕАЭС. Безопасность машин и оборудования.</div>' +
            '</div>' +

            '<div class="partner-cert-card cert-slate">' +
              '<div class="partner-cert-top">' +
                '<div class="partner-cert-icon icon-slate">' + starIcon + '</div>' +
                '<span class="partner-cert-date date-slate">до 13.06.2029</span>' +
              '</div>' +
              '<div class="partner-cert-name">Zhejiang Made</div>' +
              '<div class="partner-cert-desc">Региональный знак качества провинции Чжэцзян (浙江制造).</div>' +
            '</div>' +

            '<div class="partner-cert-card cert-blue">' +
              '<div class="partner-cert-top">' +
                '<div class="partner-cert-icon icon-blue">' + checkIcon + '</div>' +
                '<span class="partner-cert-date date-blue">до 25.12.2027</span>' +
              '</div>' +
              '<div class="partner-cert-name">ISO 9001:2015</div>' +
              '<div class="partner-cert-desc">Система менеджмента качества. Аккредитация CNAS/IAF.</div>' +
            '</div>' +

            '<div class="partner-cert-card cert-green">' +
              '<div class="partner-cert-top">' +
                '<div class="partner-cert-icon icon-green">' + checkIcon + '</div>' +
                '<span class="partner-cert-date date-green">до 25.12.2027</span>' +
              '</div>' +
              '<div class="partner-cert-name">ISO 14001:2015</div>' +
              '<div class="partner-cert-desc">Экологический менеджмент производства.</div>' +
            '</div>' +

            '<div class="partner-cert-card cert-amber">' +
              '<div class="partner-cert-top">' +
                '<div class="partner-cert-icon icon-amber">' + checkIcon + '</div>' +
                '<span class="partner-cert-date date-amber">до 25.12.2027</span>' +
              '</div>' +
              '<div class="partner-cert-name">ISO 45001:2018</div>' +
              '<div class="partner-cert-desc">Охрана труда и безопасность на производстве.</div>' +
            '</div>' +

          '</div>' +
          '<div class="partner-cert-images">' +
            '<div>' +
              '<div class="partner-cert-img-wrap" onclick="openCert(this.querySelector(\'img\').src)"><img src="docs/cert-iso9001-huazhong.jpg" alt="ISO 9001:2015" loading="lazy"></div>' +
              '<div class="cert-label">ISO 9001:2015 — Менеджмент качества</div>' +
            '</div>' +
            '<div>' +
              '<div class="partner-cert-img-wrap" onclick="openCert(this.querySelector(\'img\').src)"><img src="docs/cert-iso14001-huazhong.jpg" alt="ISO 14001:2015" loading="lazy"></div>' +
              '<div class="cert-label">ISO 14001:2015 — Экологический менеджмент</div>' +
            '</div>' +
            '<div>' +
              '<div class="partner-cert-img-wrap" onclick="openCert(this.querySelector(\'img\').src)"><img src="docs/cert-iso45001-huazhong.jpg" alt="ISO 45001:2018" loading="lazy"></div>' +
              '<div class="cert-label">ISO 45001:2018 — Охрана труда</div>' +
            '</div>' +
          '</div>' +
          '<div class="cert-overlay" id="cert-overlay" onclick="this.classList.remove(\'active\')">' +
            '<img id="cert-overlay-img" src="" alt="Сертификат">' +
          '</div>';
      }

      var aboutImgHTML = partner.id === 'bkh'
        ? '<div class="partner-about-img" style="cursor:pointer;" onclick="openCert(this.querySelector(\'img\').src)"><img src="image/bkh-family.png" alt="BKH Family" loading="lazy"></div>'
        : '';

      var catalogBtnHTML = partner.id === 'bkh'
        ? '<a href="docs/catalog-bkh.pdf" target="_blank" class="partner-catalog-btn">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
            'Каталог BKH (PDF)' +
          '</a>'
        : '';

      container.innerHTML =
        (aboutImgHTML
          ? '<div class="partner-about">' +
              '<div>' +
                '<div class="partner-hero">' +
                  '<div class="partner-hero-avatar" style="background: ' + (partner.logo ? '#fff; border: 1px solid #e5e5e5' : color) + ';">' +
                    (partner.logo ? '<img src="' + partner.logo + '" alt="' + partner.name + '" style="width:80%; height:80%; object-fit:contain;">' : initial) +
                  '</div>' +
                  '<div class="partner-hero-info">' +
                    '<div class="partner-hero-name">' + partner.name + '</div>' +
                    '<div class="partner-hero-sub">' +
                      '<span class="partner-hero-location">' +
                        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
                        partner.location +
                      '</span>' +
                      badgeHTML +
                    '</div>' +
                  '</div>' +
                '</div>' +
                (descHTML ? '<div class="partner-desc">' + descHTML + '</div>' : '') +
                catalogBtnHTML +
              '</div>' +
              aboutImgHTML +
            '</div>'
          : '<div class="partner-hero">' +
              '<div class="partner-hero-avatar" style="background: ' + color + ';">' + initial + '</div>' +
              '<div class="partner-hero-info">' +
                '<div class="partner-hero-name">' + partner.name + '</div>' +
                '<div class="partner-hero-sub">' +
                  '<span class="partner-hero-location">' +
                    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
                    partner.location +
                  '</span>' +
                  badgeHTML +
                '</div>' +
              '</div>' +
            '</div>' +
            (descHTML ? '<div class="partner-desc">' + descHTML + '</div>' : '')
        ) +
        (websiteHTML ? '<div>' + websiteHTML + '</div>' : '') +
        certsHTML +
        productsHTML +
        '<div class="partner-cta">' +
          '<p>Нужна продукция ' + partner.name + '?</p>' +
          '<span>Поможем подобрать и рассчитаем стоимость</span>' +
          '<a href="contacts.html#form" class="btn btn-primary btn-lg" style="border-radius:50px;">Оставить заявку</a>' +
        '</div>';

      if (typeof AOS !== 'undefined') AOS.refresh();
    });

    function openCert(src) {
      var overlay = document.getElementById('cert-overlay');
      document.getElementById('cert-overlay-img').src = src;
      overlay.classList.add('active');
    }
  </script>
</body>
</html>
