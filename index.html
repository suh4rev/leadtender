<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LEADTENDER</title>
<link rel="icon" href="image/short-logo.png" type="image/png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #FAFAFA; color: #333333; line-height: 1.5; }
.max-w { max-width: 1152px; margin: 0 auto; padding: 0 16px; }

/* Header */
.header { border-bottom: 1px solid #E5E5E5; background: #fff; position: sticky; top: 0; z-index: 50; }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; max-width: 1152px; margin: 0 auto; }
.logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.logo-icon { width: 40px; height: 40px; background: #D0D0D0; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #555555; font-weight: 700; }
.logo-text { font-weight: 700; color: #1A1A1A; font-size: 14px; line-height: 1.2; }
.logo-sub { font-size: 12px; color: #888888; }
.nav { display: flex; align-items: center; gap: 4px; }
.nav-btn { padding: 8px 12px; font-size: 14px; border-radius: 6px; border: none; background: none; cursor: pointer; color: #555555; transition: all .2s; }
.nav-btn:hover { background: #F0F0F0; color: #1A1A1A; }
.nav-btn.active { background: #F0F0F0; color: #1A1A1A; font-weight: 600; }
.nav-dropdown { position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #E5E5E5; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.08); padding: 4px 0; min-width: 160px; z-index: 50; }
.nav-dropdown button { display: block; width: 100%; text-align: left; padding: 8px 16px; font-size: 14px; color: #555555; border: none; background: none; cursor: pointer; }
.nav-dropdown button:hover { background: #F0F0F0; color: #1A1A1A; }
.header-contacts { display: flex; align-items: center; gap: 16px; font-size: 14px; color: #555555; }
.header-contacts .label { font-size: 11px; color: #888888; }
.header-contacts .value { font-weight: 500; color: #333333; }
.burger { display: none; padding: 8px; border: none; background: none; cursor: pointer; }
.mobile-actions { display: none; align-items: center; gap: 8px; }
.mobile-cart { display: none; }
.burger span { display: block; width: 24px; height: 2px; background: #555555; margin: 5px 0; transition: all .3s; }
.mobile-menu { display: none; border-top: 1px solid #E5E5E5; background: #fff; padding: 8px 16px; position: absolute; top: 100%; left: 0; right: 0; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,.12); max-height: 80vh; overflow-y: auto; }
.mobile-menu button { display: block; width: 100%; text-align: left; padding: 10px 0; font-size: 14px; color: #555555; border: none; background: none; cursor: pointer; font-weight: 500; }
.mobile-menu .sub { padding-left: 24px; color: #888888; font-weight: 400; }

/* Page map */
.pagemap { background: #FAFAFA; border-bottom: 1px solid #E5E5E5; overflow-x: auto; }
.pagemap-inner { display: flex; align-items: center; gap: 4px; padding: 8px 16px; max-width: 1152px; margin: 0 auto; flex-wrap: nowrap; }
.pagemap-label { font-size: 12px; color: #888888; font-weight: 500; white-space: nowrap; margin-right: 4px; }
.pagemap-btn { padding: 4px 8px; font-size: 11px; border-radius: 4px; border: none; background: none; cursor: pointer; white-space: nowrap; color: #888888; transition: all .2s; }
.pagemap-btn:hover { background: #E5E5E5; color: #333333; }
.pagemap-btn.active { background: #1A1A1A; color: #fff; }

/* Breadcrumb */
.breadcrumb { font-size: 12px; color: #888888; padding: 12px 0; }
.breadcrumb span { cursor: pointer; }
.breadcrumb span:hover { color: #E02020; }

/* Wire blocks */
.wire { border: 1px solid #E5E5E5; background: #FFFFFF; border-radius: 8px; padding: 16px; margin-bottom: 0; }
.wire.dashed { border-style: dashed; border-color: #D0D0D0; }
.wire.clickable { cursor: pointer; transition: all .2s; }
.wire.clickable:hover { background: #FAFAFA; border-color: #D0D0D0; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.wire-label { font-size: 11px; font-weight: 700; color: #888888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }

/* Placeholder image */
.ph-img { background: #E5E5E5; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #888888; font-size: 11px; }

/* Buttons */
.btn { padding: 10px 20px; font-size: 14px; border-radius: 6px; font-weight: 500; cursor: pointer; transition: all .2s; border: none; }
.btn.sm { padding: 6px 12px; font-size: 12px; }
.btn.primary { background: #E02020; color: #fff; }
.btn.primary:hover { background: #C41818; }
.btn.secondary { background: #F5F5F5; border: 2px solid #D0D0D0; color: #555555; }
.btn.secondary:hover { border-color: #888888; }

/* Form fields */
.form-field label { font-size: 12px; color: #555555; display: block; margin-bottom: 4px; }
.form-field input, .form-field textarea { width: 100%; border: 1px solid #E5E5E5; border-radius: 6px; padding: 8px; font-size: 14px; background: #fff; transition: border-color .2s; }
.form-field input:focus, .form-field textarea:focus { outline: none; border-color: #E02020; }
.form-field textarea { height: 80px; resize: vertical; }

/* Badge */
.badge { display: inline-block; background: #FEF2F2; color: #E02020; font-size: 11px; padding: 2px 8px; border-radius: 99px; }

/* Grid helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.gap-sm { gap: 12px; }
.gap-lg { gap: 24px; }
.stack { display: flex; flex-direction: column; gap: 24px; }
.row { display: flex; gap: 12px; align-items: center; }
.text-center { text-align: center; }
.text-xs { font-size: 12px; }
.text-sm { font-size: 14px; }
.text-lg { font-size: 18px; }
.text-xl { font-size: 20px; }
.text-2xl { font-size: 24px; }
.text-gray { color: #888888; }
.text-dark { color: #1A1A1A; }
.font-bold { font-weight: 700; }
.font-medium { font-weight: 500; }
.italic { font-style: italic; }
.mt-1 { margin-top: 4px; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mb-1 { margin-bottom: 4px; }
.mb-2 { margin-bottom: 8px; }
.mb-4 { margin-bottom: 16px; }

/* Skeleton lines */
.skel { height: 8px; background: #E5E5E5; border-radius: 4px; margin-bottom: 6px; }
.skel.title { height: 12px; background: #D0D0D0; }
.skel.thin { height: 6px; background: #F0F0F0; }

/* Footer */
.footer { border-top: none; background: #111111; margin-top: 48px; padding: 32px 0; }
.footer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; font-size: 14px; }
.footer-title { font-size: 11px; font-weight: 600; color: #999999; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.footer a, .footer button { color: #AAAAAA; font-size: 12px; text-decoration: none; display: block; margin-bottom: 4px; border: none; background: none; cursor: pointer; padding: 0; text-align: left; }
.footer a:hover, .footer button:hover { color: #FFFFFF; }
.footer-bottom { border-top: 1px solid #333333; margin-top: 24px; padding-top: 16px; text-align: center; font-size: 12px; color: #666666; }

/* Filter pills */
.pill { padding: 6px 12px; font-size: 12px; border-radius: 99px; border: 2px solid #E5E5E5; background: none; cursor: pointer; color: #888888; transition: all .2s; }
.pill.active { border-color: #E02020; background: #FEF2F2; color: #E02020; font-weight: 600; }
.pill:hover { border-color: #D0D0D0; }

/* Checkbox placeholder */
.checkbox { display: flex; align-items: center; gap: 8px; }
.checkbox-box { width: 16px; height: 16px; border: 2px solid #D0D0D0; border-radius: 4px; flex-shrink: 0; }

/* Table */
.spec-table { width: 100%; font-size: 14px; border-collapse: collapse; }
.spec-table tr:nth-child(even) { background: #FAFAFA; }
.spec-table td { padding: 6px 8px; }
.spec-table td:first-child { color: #555555; }
.spec-table td:last-child { font-weight: 500; color: #333333; }

/* Quantity control */
.qty { display: inline-flex; align-items: center; border: 2px solid #E5E5E5; border-radius: 6px; overflow: hidden; }
.qty button { width: 32px; height: 32px; border: none; background: none; cursor: pointer; font-size: 16px; color: #888888; }
.qty span { width: 32px; text-align: center; font-size: 14px; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

/* Cart item */
.cart-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #F0F0F0; }
.cart-item:last-child { border-bottom: none; }
.cart-remove { background: none; border: none; cursor: pointer; font-size: 18px; color: #D0D0D0; padding: 4px 8px; }
.cart-remove:hover { color: #ef4444; }

/* Product card in catalog */
.product-card .product-info { cursor: pointer; }
.product-card .product-info:hover .product-name { color: #E02020; }

/* Responsive */
@media (max-width: 768px) {
  .nav, .header-contacts { display: none; }
  .burger { display: block; }
  .mobile-actions { display: flex; }
  .mobile-cart { display: block; }
  .mobile-menu.open { display: block; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
  .grid-2.md-only { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
  .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
}

/* Scrollbar for pagemap */
.pagemap::-webkit-scrollbar { height: 4px; }
.pagemap::-webkit-scrollbar-thumb { background: #D0D0D0; border-radius: 2px; }

/* Hero */
.hero { text-align: center; padding: 32px 16px; }

/* Partner card */
.partner-card { border: 1px solid #E5E5E5; border-radius: 8px; padding: 16px; text-align: center; transition: all .2s; background: #FFFFFF; }
.partner-card.clickable { cursor: pointer; }
.partner-card.clickable:hover { border-color: #D0D0D0; box-shadow: 0 2px 8px rgba(0,0,0,.06); }

/* Review card */
.review-card { border: 1px solid #E5E5E5; border-radius: 8px; padding: 16px; background: #FFFFFF; }
.review-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }

/* News item */
.news-item { display: flex; gap: 16px; }

/* Contact grid */
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }

/* Play button overlay */
.video-thumb { position: relative; }
.play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #888888; }

/* Advantage item */
.advantage { text-align: center; padding: 12px; }
.advantage-icon { width: 56px; height: 56px; background: #FEF2F2; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #E02020; }

/* Category card */
.cat-card { cursor: pointer; }
.cat-card:hover .cat-name { color: #E02020; }
.cat-name { font-size: 14px; font-weight: 500; color: #555555; margin-top: 8px; transition: color .2s; }
.info-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 768px) { .info-list { grid-template-columns: 1fr; } }
/* Dark Hero */
.hero-dark {
  position: relative; overflow: hidden; border-radius: 12px;
  background: url('image/hero_banner.png') center right / cover no-repeat, #0A0A0A;
  padding: 80px 24px; text-align: center; min-height: 380px;
  display: flex; align-items: center; justify-content: center;
}
.hero-overlay {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(0,0,0,.7) 0%, rgba(0,0,0,.3) 80%),
    linear-gradient(to bottom, rgba(0,0,0,.6) 0%, rgba(0,0,0,.4) 30%, rgba(0,0,0,.5) 70%, rgba(0,0,0,.7) 100%);
}
.hero-particles { position: absolute; inset: 0; pointer-events: none; }
.hero-spark {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,140,50,.9) 0%, rgba(224,32,32,.6) 50%, transparent 100%);
  animation: sparkle ease-in-out infinite alternate;
}
@keyframes sparkle {
  0% { transform: scale(0.5); opacity: 0.2; }
  100% { transform: scale(1.2); opacity: 1; }
}
.hero-content { position: relative; z-index: 2; max-width: 700px; margin: 0 auto; }
.hero-badge {
  display: inline-block; padding: 4px 16px; border-radius: 99px;
  border: 1px solid rgba(224,32,32,.5); background: rgba(224,32,32,.2);
  color: #FFFFFF; font-size: 11px; font-weight: 700; letter-spacing: .1em; margin-bottom: 20px;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  text-shadow: 0 1px 4px rgba(0,0,0,.5);
}
.hero-title {
  font-size: 36px; font-weight: 800; color: #FFFFFF; line-height: 1.2; margin: 0 0 16px;
  text-shadow: 0 2px 8px rgba(0,0,0,.8), 0 4px 24px rgba(0,0,0,.5);
}
.hero-sub {
  font-size: 16px; color: rgba(255,255,255,.85); line-height: 1.6; margin: 0;
  text-shadow: 0 1px 6px rgba(0,0,0,.8), 0 2px 16px rgba(0,0,0,.5);
}
.btn-hero { padding: 14px 28px; font-size: 15px; border-radius: 8px; box-shadow: 0 4px 20px rgba(224,32,32,.3); }
.btn-hero:hover { box-shadow: 0 6px 28px rgba(224,32,32,.5); }
.btn-hero-outline {
  padding: 14px 28px; font-size: 15px; border-radius: 8px;
  background: transparent; border: 1px solid rgba(255,255,255,.25); color: rgba(255,255,255,.8);
  cursor: pointer; transition: all .2s;
}
.btn-hero-outline:hover { border-color: rgba(255,255,255,.5); color: #fff; background: rgba(255,255,255,.05); }
.hero-line {
  position: absolute; background: linear-gradient(90deg, transparent, rgba(224,32,32,.15), transparent);
  height: 1px; pointer-events: none;
}
.hero-line-1 { bottom: 30%; left: 0; right: 0; transform: rotate(-3deg); }
.hero-line-2 { top: 25%; left: 0; right: 0; transform: rotate(2deg); opacity: .5; }

@media (max-width: 768px) {
  .hero-dark { padding: 48px 16px; min-height: 300px; }
  .hero-title { font-size: 24px; }
  .hero-sub { font-size: 14px; }
  .btn-hero, .btn-hero-outline { padding: 12px 20px; font-size: 13px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── Helpers ──
const PhImg = ({ w = "100%", h = 120, label = "IMG", style = {} }) => (
  <div className="ph-img" style={{ width: w, height: h, ...style }}>{label}</div>
);

const WireBlock = ({ label, dashed, clickable, onClick, children }) => (
  <div className={`wire${dashed ? " dashed" : ""}${clickable || onClick ? " clickable" : ""}`} onClick={onClick}>
    {label && <div className="wire-label">{label}</div>}
    {children}
  </div>
);

const Skel = ({ w = "100%", title, thin }) => (
  <div className={`skel${title ? " title" : ""}${thin ? " thin" : ""}`} style={{ width: w }} />
);

const ContactForm = () => (
  <WireBlock label="Форма обратной связи">
    <div className="grid-2 gap-sm" style={{ maxWidth: 500 }}>
      <div className="form-field"><label>Имя</label><input disabled /></div>
      <div className="form-field"><label>Телефон</label><input disabled /></div>
      <div className="form-field"><label>Email</label><input disabled /></div>
      <div className="form-field"><label>Компания</label><input disabled /></div>
      <div className="form-field" style={{ gridColumn: "1 / -1" }}><label>Сообщение</label><textarea disabled /></div>
    </div>
    <div className="checkbox mt-2">
      <div className="checkbox-box" />
      <span className="text-xs text-gray">Согласие на обработку персональных данных</span>
    </div>
    <div className="mt-3"><button className="btn primary">Отправить заказ</button></div>
    <div className="text-xs text-gray italic mt-2">→ Письмо на email менеджера + автоответ «Заявка принята»</div>
  </WireBlock>
);

// ── Header ──
const Header = ({ navigate, page, menuOpen, setMenuOpen, cart }) => {
  const [openSub, setOpenSub] = useState(null);
  const cartCount = cart ? Object.values(cart).reduce((a, b) => a + b, 0) : 0;
  const items = [
    { id: "home", label: "Главная", sub: [
      { id: "about", label: "О компании" },
      { id: "partners", label: "Партнёры" },
      { id: "reviews", label: "Отзывы" },
    ]},
    { id: "catalog", label: "Продукция" },
    { id: "info", label: "Информация" },
    { id: "news", label: "Новости" },
    { id: "contacts", label: "Контакты" },
  ];

  return (
    <header className="header">
      <div className="header-inner">
        <div className="logo" onClick={() => navigate("home")}>
          <img src="image/long-logo.png" alt="Leadtender" style={{ height: 30, objectFit: "contain" }} />
        </div>
        <nav className="nav">
          {items.map(item => (
            <div key={item.id} style={{ position: "relative" }}
              onMouseEnter={() => item.sub && setOpenSub(item.id)}
              onMouseLeave={() => setOpenSub(null)}>
              <button className={`nav-btn${page === item.id || (item.sub && item.sub.some(s => s.id === page)) ? " active" : ""}`}
                onClick={() => navigate(item.id)}>
                {item.label}{item.sub ? " ▾" : ""}
              </button>
              {item.sub && openSub === item.id && (
                <div className="nav-dropdown">
                  {item.sub.map(s => (
                    <button key={s.id} onClick={() => { navigate(s.id); setOpenSub(null); }}>{s.label}</button>
                  ))}
                </div>
              )}
            </div>
          ))}
        </nav>
        <div className="header-contacts">
          <div><div className="label">Email</div><div className="value">info@leadtender.ru</div></div>
          <button onClick={() => navigate("cart")} style={{ position: "relative", background: "none", border: "2px solid #E5E5E5", borderRadius: 8, padding: "8px 12px", cursor: "pointer", fontSize: 18, lineHeight: 1, transition: "all .2s" }} onMouseOver={e => e.currentTarget.style.borderColor = "#888888"} onMouseOut={e => e.currentTarget.style.borderColor = "#E5E5E5"}>
            🛒{cartCount > 0 && <span style={{ position: "absolute", top: -6, right: -6, background: "#E02020", color: "#fff", fontSize: 10, fontWeight: 700, borderRadius: 99, minWidth: 18, height: 18, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 4px" }}>{cartCount}</span>}
          </button>
        </div>
        <div className="mobile-actions">
          <button onClick={() => navigate("cart")} className="mobile-cart" style={{ position: "relative", background: "none", border: "2px solid #E5E5E5", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 16, lineHeight: 1 }}>
            🛒{cartCount > 0 && <span style={{ position: "absolute", top: -6, right: -6, background: "#E02020", color: "#fff", fontSize: 10, fontWeight: 700, borderRadius: 99, minWidth: 18, height: 18, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 4px" }}>{cartCount}</span>}
          </button>
          <button className="burger" onClick={() => setMenuOpen(!menuOpen)}>
          <span /><span /><span />
        </button>
        </div>
      </div>
      <div className={`mobile-menu${menuOpen ? " open" : ""}`}>
        {items.map(item => (
          <div key={item.id}>
            <button onClick={() => { navigate(item.id); setMenuOpen(false); }}>{item.label}</button>
            {item.sub && item.sub.map(s => (
              <button key={s.id} className="sub" onClick={() => { navigate(s.id); setMenuOpen(false); }}>{s.label}</button>
            ))}
          </div>
        ))}
      </div>
    </header>
  );
};

// ── Footer ──
const Footer = ({ navigate }) => (
  <footer className="footer">
    <div className="max-w">
      <div className="footer-grid">
        <div>
          <div style={{ fontWeight: 700, color: "#FFFFFF", marginBottom: 8 }}>ЛИДТЕНДЕР</div>
          <div className="text-xs text-gray">ООО «Лидтендер»<br />ИНН: 5919031967<br />ОГРН: 1235900000874<br />КПП: 591901001<br />ОКПО: 56777597</div>
        </div>
        <div>
          <div className="footer-title">Разделы</div>
          {[["home","Главная"],["catalog","Продукция"],["info","Информация"],["news","Новости"],["contacts","Контакты"]].map(([id, l]) => (
            <button key={id} onClick={() => navigate(id)}>{l}</button>
          ))}
        </div>
        <div>
          <div className="footer-title">Контакты</div>
          <div className="text-xs text-gray">info@leadtender.ru<br />г. Соликамск, ул. Черняховского, д. 8А, пом. 9</div>
        </div>
        <div>
          <div className="footer-title">Документы</div>
          <button onClick={() => navigate("privacy")}>Политика конфиденциальности</button>
          <span className="text-xs text-gray">Согласие на обработку ПД</span>
        </div>
      </div>
      <div className="footer-bottom">© 2026 ООО «Лидтендер». Все права защищены.</div>
    </div>
  </footer>
);

// ── PAGES ──

  <div className="stack">

const PageCatalog = ({ navigate, cart, setCart }) => {
  const products = [
    { id: 1, name: "Круг отрезной 125×1.0×22 A60", cat: "Отрезные" },
    { id: 2, name: "Круг отрезной 230×2.0×22 A46", cat: "Отрезные" },
    { id: 3, name: "Круг отрезной 150×1.6×22 A54", cat: "Отрезные" },
    { id: 4, name: "Круг шлифовальный 125×6×22 A24", cat: "Шлифовальные" },
    { id: 5, name: "Круг шлифовальный 180×6×22 A30", cat: "Шлифовальные" },
    { id: 6, name: "Круг лепестковый 125×22 P60", cat: "Шлифовальные" },
  ];
  const [filter, setFilter] = useState("all");
  const filtered = filter === "all" ? products : products.filter(p => p.cat === filter);
  const cartCount = Object.values(cart).reduce((a, b) => a + b, 0);

  return (
    <div className="stack">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div><div className="text-xl font-bold text-dark">Каталог продукции</div><div className="text-sm text-gray">Отрезные и шлифовальные диски</div></div>
        <button className="btn sm secondary" onClick={() => navigate("cart")}>🛒 Корзина ({cartCount})</button>
      </div>
      <WireBlock label="Фильтр по категориям">
        <div className="row">
          {[["all","Все"],["Отрезные","Отрезные диски"],["Шлифовальные","Шлифовальные диски"]].map(([v, l]) => (
            <button key={v} className={`pill${filter === v ? " active" : ""}`} onClick={() => setFilter(v)}>{l}</button>
          ))}
        </div>
      </WireBlock>
      <div className="grid-3">
        {filtered.map(p => (
          <div key={p.id} className="wire product-card">
            <div className="product-info" onClick={() => navigate("product-detail")}>
              <PhImg h={120} label="ФОТО ТОВАРА" />
              <div className="mt-1"><span className="badge">{p.cat}</span></div>
              <div className="text-sm font-medium text-dark product-name mt-1">{p.name}</div>
              <Skel w="75%" /><Skel w="50%" thin />
              <div className="text-xs text-gray mt-2">Цена по запросу</div>
            </div>
            <div className="row mt-2">
              {!cart[p.id] ? (
                <button className="btn sm primary" onClick={() => setCart(c => ({ ...c, [p.id]: 1 }))}>В корзину</button>
              ) : (
                <div className="row">
                  <div className="qty">
                    <button onClick={() => setCart(c => { const v = (c[p.id] || 1) - 1; if (v <= 0) { const n = { ...c }; delete n[p.id]; return n; } return { ...c, [p.id]: v }; })}>−</button>
                    <input type="number" value={cart[p.id]} min="1" onChange={e => { const v = parseInt(e.target.value) || 0; if (v <= 0) { setCart(c => { const n = { ...c }; delete n[p.id]; return n; }); } else { setCart(c => ({ ...c, [p.id]: v })); } }} style={{ width: 44, textAlign: "center", border: "none", fontSize: 14, outline: "none", MozAppearance: "textfield", WebkitAppearance: "none" }} />
                    <button onClick={() => setCart(c => ({ ...c, [p.id]: (c[p.id] || 0) + 1 }))}>+</button>
                  </div>
                  <span className="text-xs text-gray">в корзине</span>
                </div>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

    <div className="text-sm text-gray mb-4">Запрашиваемая страница не существует или была удалена</div>
    <button className="btn primary" onClick={() => navigate("home")}>На главную</button>
  </div>
);

const PagePrivacy = () => (
  <div className="stack" style={{ maxWidth: 768 }}>
    <div className="text-xl font-bold text-dark">Политика конфиденциальности</div>
    <WireBlock label="Текст политики (152-ФЗ)">
      {Array.from({ length: 20 }, (_, i) => <Skel key={i} w={`${70 + Math.random() * 30}%`} />)}
      <div className="text-xs text-gray italic mt-3">Обязательна при наличии форм сбора данных (требование 152-ФЗ)</div>
    </WireBlock>
  </div>
);

// ── MAIN APP ──
const App = () => {
  const [page, setPage] = useState("home");
  const [menuOpen, setMenuOpen] = useState(false);
  const [cart, setCart] = useState({});

  const navigate = (p) => { setPage(p); setMenuOpen(false); window.scrollTo({ top: 0, behavior: "smooth" }); };

  const pageNames = {
    home: "Главная → О компании", about: "Главная → О компании",
    partners: "Главная → Партнёры", reviews: "Главная → Отзывы",
    "partner-vkn": "Страница партнёра (ВКН)", catalog: "Каталог продукции",
    "product-detail": "Карточка товара", cart: "Корзина",
    info: "Информация", article: "Статья", news: "Новости",
    "news-detail": "Новость (детально)", contacts: "Контакты",
    privacy: "Политика конфиденциальности", "404": "Страница 404",
  };

  const pages = {
    home: <PageHome navigate={navigate} />,
    about: <PageHome navigate={navigate} />,
    partners: <PagePartners navigate={navigate} />,
    reviews: <PageReviews navigate={navigate} />,
    "partner-vkn": <PagePartnerVKN navigate={navigate} />,
    catalog: <PageCatalog navigate={navigate} cart={cart} setCart={setCart} />,
    "product-detail": <PageProductDetail navigate={navigate} cart={cart} setCart={setCart} />,
    cart: <PageCart navigate={navigate} cart={cart} setCart={setCart} />,
    info: <PageInfo navigate={navigate} />,
    article: <PageArticle navigate={navigate} />,
    news: <PageNews navigate={navigate} />,
    "news-detail": <PageNewsDetail navigate={navigate} />,
    contacts: <PageContacts navigate={navigate} />,
    privacy: <PagePrivacy />,
    "404": <Page404 navigate={navigate} />,
  };

  return (
    <div>
      <Header navigate={navigate} page={page} menuOpen={menuOpen} setMenuOpen={setMenuOpen} cart={cart} />



      <div className="max-w">
        <div className="breadcrumb">
          <span onClick={() => navigate("home")}>Главная</span>
          {page !== "home" && page !== "about" && <span> / {pageNames[page]}</span>}
        </div>
        <main style={{ paddingBottom: 32 }}>
          {pages[page] || <Page404 navigate={navigate} />}
        </main>
      </div>

      <Footer navigate={navigate} />
    </div>
  );
};

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
