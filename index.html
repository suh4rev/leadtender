<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LEADTENDER</title>
<link rel="icon" href="image/short-logo.png" type="image/png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #FAFAFA; color: #333333; line-height: 1.5; font-size: 16px; }
.max-w { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* Header */
.header { border-bottom: 1px solid #E5E5E5; background: #fff; position: sticky; top: 0; z-index: 50; }
.header-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; max-width: 1400px; margin: 0 auto; }
.logo { display: flex; align-items: center; gap: 14px; cursor: pointer; }
.logo-icon { width: 48px; height: 48px; background: #D0D0D0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #555555; font-weight: 700; }
.logo-text { font-weight: 700; color: #1A1A1A; font-size: 17px; line-height: 1.2; }
.logo-sub { font-size: 14px; color: #888888; }
.nav { display: flex; align-items: center; gap: 6px; }
.nav-btn { padding: 10px 16px; font-size: 16px; border-radius: 8px; border: none; background: none; cursor: pointer; color: #555555; transition: all .2s; }
.nav-btn:hover { background: #F0F0F0; color: #1A1A1A; }
.nav-btn.active { background: #F0F0F0; color: #1A1A1A; font-weight: 600; }
.nav-dropdown { position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #E5E5E5; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.08); padding: 6px 0; min-width: 200px; z-index: 50; }
.nav-dropdown button { display: block; width: 100%; text-align: left; padding: 10px 20px; font-size: 16px; color: #555555; border: none; background: none; cursor: pointer; }
.nav-dropdown button:hover { background: #F0F0F0; color: #1A1A1A; }
.header-contacts { display: flex; align-items: center; gap: 20px; font-size: 16px; color: #555555; }
.header-contacts .label { font-size: 13px; color: #888888; }
.header-contacts .value { font-weight: 500; color: #333333; font-size: 16px; }
.burger { display: none; padding: 10px; border: none; background: none; cursor: pointer; }
.mobile-actions { display: none; align-items: center; gap: 10px; }
.mobile-cart { display: none; }
.burger span { display: block; width: 28px; height: 3px; background: #555555; margin: 6px 0; transition: all .3s; }
.mobile-menu { display: none; border-top: 1px solid #E5E5E5; background: #fff; padding: 10px 20px; position: absolute; top: 100%; left: 0; right: 0; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,.12); max-height: 80vh; overflow-y: auto; }
.mobile-menu button { display: block; width: 100%; text-align: left; padding: 12px 0; font-size: 17px; color: #555555; border: none; background: none; cursor: pointer; font-weight: 500; }
.mobile-menu .sub { padding-left: 28px; color: #888888; font-weight: 400; }

/* Page map */
.pagemap { background: #FAFAFA; border-bottom: 1px solid #E5E5E5; overflow-x: auto; }
.pagemap-inner { display: flex; align-items: center; gap: 6px; padding: 10px 24px; max-width: 1400px; margin: 0 auto; flex-wrap: nowrap; }
.pagemap-label { font-size: 14px; color: #888888; font-weight: 500; white-space: nowrap; margin-right: 6px; }
.pagemap-btn { padding: 6px 10px; font-size: 13px; border-radius: 6px; border: none; background: none; cursor: pointer; white-space: nowrap; color: #888888; transition: all .2s; }
.pagemap-btn:hover { background: #E5E5E5; color: #333333; }
.pagemap-btn.active { background: #1A1A1A; color: #fff; }

/* Breadcrumb */
.breadcrumb { font-size: 14px; color: #888888; padding: 14px 0; }
.breadcrumb span { cursor: pointer; }
.breadcrumb span:hover { color: #E02020; }

/* Wire blocks */
.wire { border: 1px solid #E5E5E5; background: #FFFFFF; border-radius: 10px; padding: 20px; margin-bottom: 0; }
.wire.dashed { border-style: dashed; border-color: #D0D0D0; }
.wire.clickable { cursor: pointer; transition: all .2s; }
.wire.clickable:hover { background: #FAFAFA; border-color: #D0D0D0; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
.wire-label { font-size: 13px; font-weight: 700; color: #888888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }

/* Placeholder image */
.ph-img { background: #E5E5E5; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #888888; font-size: 13px; }

/* Buttons */
.btn { padding: 12px 24px; font-size: 16px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all .2s; border: none; }
.btn.sm { padding: 8px 16px; font-size: 14px; }
.btn.primary { background: #E02020; color: #fff; }
.btn.primary:hover { background: #C41818; }
.btn.secondary { background: #F5F5F5; border: 2px solid #D0D0D0; color: #555555; }
.btn.secondary:hover { border-color: #888888; }

/* Form fields */
.form-field label { font-size: 14px; color: #555555; display: block; margin-bottom: 6px; }
.form-field input, .form-field textarea { width: 100%; border: 1px solid #E5E5E5; border-radius: 8px; padding: 10px 12px; font-size: 16px; background: #fff; transition: border-color .2s; }
.form-field input:focus, .form-field textarea:focus { outline: none; border-color: #E02020; }
.form-field textarea { height: 100px; resize: vertical; }

/* Badge */
.badge { display: inline-block; background: #FEF2F2; color: #E02020; font-size: 13px; padding: 3px 10px; border-radius: 99px; }

/* Grid helpers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.gap-sm { gap: 16px; }
.gap-lg { gap: 28px; }
.stack { display: flex; flex-direction: column; gap: 28px; }
.row { display: flex; gap: 14px; align-items: center; }
.text-center { text-align: center; }
.text-xs { font-size: 14px; }
.text-sm { font-size: 16px; }
.text-lg { font-size: 22px; }
.text-xl { font-size: 24px; }
.text-2xl { font-size: 28px; }
.text-gray { color: #888888; }
.text-dark { color: #1A1A1A; }
.font-bold { font-weight: 700; }
.font-medium { font-weight: 500; }
.italic { font-style: italic; }
.mt-1 { margin-top: 6px; }
.mt-2 { margin-top: 10px; }
.mt-3 { margin-top: 16px; }
.mb-1 { margin-bottom: 6px; }
.mb-2 { margin-bottom: 10px; }
.mb-4 { margin-bottom: 20px; }

/* Skeleton lines */
.skel { height: 10px; background: #E5E5E5; border-radius: 5px; margin-bottom: 8px; }
.skel.title { height: 14px; background: #D0D0D0; }
.skel.thin { height: 8px; background: #F0F0F0; }

/* Footer */
.footer { border-top: none; background: #111111; margin-top: 56px; padding: 40px 0; }
.footer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; font-size: 16px; }
.footer-title { font-size: 13px; font-weight: 600; color: #999999; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
.footer a, .footer button { color: #AAAAAA; font-size: 14px; text-decoration: none; display: block; margin-bottom: 6px; border: none; background: none; cursor: pointer; padding: 0; text-align: left; }
.footer a:hover, .footer button:hover { color: #FFFFFF; }
.footer-bottom { border-top: 1px solid #333333; margin-top: 28px; padding-top: 20px; text-align: center; font-size: 14px; color: #666666; }

/* Filter pills */
.pill { padding: 8px 16px; font-size: 14px; border-radius: 99px; border: 2px solid #E5E5E5; background: none; cursor: pointer; color: #888888; transition: all .2s; }
.pill.active { border-color: #E02020; background: #FEF2F2; color: #E02020; font-weight: 600; }
.pill:hover { border-color: #D0D0D0; }

/* Checkbox placeholder */
.checkbox { display: flex; align-items: center; gap: 10px; }
.checkbox-box { width: 20px; height: 20px; border: 2px solid #D0D0D0; border-radius: 5px; flex-shrink: 0; }

/* Table */
.spec-table { width: 100%; font-size: 16px; border-collapse: collapse; }
.spec-table tr:nth-child(even) { background: #FAFAFA; }
.spec-table td { padding: 8px 10px; }
.spec-table td:first-child { color: #555555; }
.spec-table td:last-child { font-weight: 500; color: #333333; }

/* Quantity control */
.qty { display: inline-flex; align-items: center; border: 2px solid #E5E5E5; border-radius: 8px; overflow: hidden; }
.qty button { width: 40px; height: 40px; border: none; background: none; cursor: pointer; font-size: 18px; color: #888888; }
.qty span { width: 40px; text-align: center; font-size: 16px; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }


/* Product card in catalog */
.product-card .product-info { cursor: pointer; }
.product-card .product-info:hover .product-name { color: #E02020; }

/* Responsive */
@media (max-width: 768px) {
  .nav, .header-contacts { display: none; }
  .burger { display: block; }
  .mobile-actions { display: flex; }
  .mobile-cart { display: block; }
  .mobile-menu.open { display: block; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
  .grid-2.md-only { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
  .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
}

/* Scrollbar for pagemap */
.pagemap::-webkit-scrollbar { height: 4px; }
.pagemap::-webkit-scrollbar-thumb { background: #D0D0D0; border-radius: 2px; }

/* Hero */
.hero { text-align: center; padding: 40px 20px; }

/* Partner card */
.partner-card { border: 1px solid #E5E5E5; border-radius: 10px; padding: 20px; text-align: center; transition: all .2s; background: #FFFFFF; }
.partner-card.clickable { cursor: pointer; }
.partner-card.clickable:hover { border-color: #D0D0D0; box-shadow: 0 2px 8px rgba(0,0,0,.06); }

/* Review card */
.review-card { border: 1px solid #E5E5E5; border-radius: 10px; padding: 20px; background: #FFFFFF; }
.review-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }

/* News item */
.news-item { display: flex; gap: 20px; }

/* Contact grid */
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
@media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }

/* Play button overlay */
.video-thumb { position: relative; }
.play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #888888; }

/* Advantage item */
.advantage { text-align: center; padding: 16px; }
.advantage-icon { width: 68px; height: 68px; background: #FEF2F2; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #E02020; }

/* Category card */
.cat-card { cursor: pointer; }
.cat-card:hover .cat-name { color: #E02020; }
.cat-name { font-size: 16px; font-weight: 500; color: #555555; margin-top: 10px; transition: color .2s; }
.info-list { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 768px) { .info-list { grid-template-columns: 1fr; } }
/* Manufacturer card */
.manufacturer-card { border: 1px solid #E5E5E5; border-radius: 10px; padding: 18px 20px; background: #FAFAFA; transition: all .2s; margin-top: 6px; }
.manufacturer-card:hover { border-color: #D0D0D0; box-shadow: 0 2px 8px rgba(0,0,0,.06); }

/* Docs card */
.docs-card { border: 1px solid #E5E5E5; border-radius: 10px; padding: 18px 20px; background: #fff; margin-top: 6px; }
.doc-link { display: flex; align-items: center; gap: 10px; font-size: 15px; color: #333; text-decoration: none; padding: 6px 0; transition: color .15s; }
.doc-link:hover { color: #E02020; }

/* Catalog breadcrumb */
.catalog-breadcrumb { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding: 12px 20px; background: #F5F5F5; border-radius: 10px; border: 1px solid #E5E5E5; min-height: 52px; }
.catalog-breadcrumb-home { font-size: 15px; color: #E02020; cursor: pointer; transition: color .15s; }
.catalog-breadcrumb-home:hover { color: #C41818; text-decoration: underline; }
.catalog-breadcrumb-sep { font-size: 13px; color: #CCCCCC; }
.catalog-breadcrumb-current { font-size: 15px; font-weight: 600; color: #1A1A1A; }
.catalog-breadcrumb-reset { margin-left: auto; width: 28px; height: 28px; border-radius: 50%; border: 1px solid #D0D0D0; background: #fff; cursor: pointer; font-size: 13px; color: #888; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.catalog-breadcrumb-reset:hover { background: #FEF2F2; border-color: #E02020; color: #E02020; }

/* Catalog sidebar */
.catalog-sidebar { width: 300px; flex-shrink: 0; border: 1px solid #E5E5E5; border-radius: 10px; background: #fff; overflow: hidden; min-height: 600px; align-self: flex-start; position: sticky; top: 70px; }
.catalog-cat-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 20px; font-size: 16px; font-weight: 500; color: #333; border: none; background: none; cursor: pointer; text-align: left; transition: all .15s; border-bottom: 1px solid #F0F0F0; }
.catalog-cat-btn:last-child { border-bottom: none; }
.catalog-cat-btn:hover { background: #F5F5F5; }
.catalog-cat-btn.active { background: #FEF2F2; color: #E02020; }
.catalog-cat-icon { width: 38px; height: 38px; background: #F5F5F5; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #888; flex-shrink: 0; transition: all .15s; }
.catalog-cat-btn.active .catalog-cat-icon { background: rgba(224,32,32,.1); color: #E02020; }
.catalog-sub-list { border-bottom: 1px solid #F0F0F0; }
.catalog-sub-btn { display: block; width: 100%; padding: 10px 20px 10px 58px; font-size: 15px; color: #666; border: none; background: none; cursor: pointer; text-align: left; transition: all .15s; }
.catalog-sub-btn:hover { background: #F5F5F5; color: #333; }
.catalog-sub-btn.active { color: #E02020; font-weight: 500; background: #FEF2F2; }
@media (max-width: 768px) {
  .catalog-sidebar { width: 100%; }
  .catalog-sidebar + div .grid-3 { grid-template-columns: 1fr 1fr; }
}

/* Section blocks */
.section-block { background: #fff; border-radius: 14px; padding: 40px; border: 1px solid #E5E5E5; }
.section-header { margin-bottom: 28px; }
.section-title { font-size: 26px; font-weight: 800; color: #1A1A1A; margin: 0 0 6px; }
.section-subtitle { font-size: 16px; color: #888; margin: 0; }

/* Advantage cards */
.advantage-card { padding: 24px; border-radius: 12px; background: #FAFAFA; border: 1px solid #F0F0F0; transition: all .2s; }
.advantage-card:hover { border-color: #E5E5E5; box-shadow: 0 2px 12px rgba(0,0,0,.04); }
.advantage-card-icon { width: 52px; height: 52px; background: #FEF2F2; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #E02020; margin-bottom: 14px; }

/* Category cards */
.category-card { display: flex; align-items: center; gap: 16px; padding: 20px; border-radius: 12px; border: 1px solid #E5E5E5; background: #fff; cursor: pointer; transition: all .2s; }
.category-card:hover { border-color: #D0D0D0; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.category-card:hover .category-card-icon { background: #FEF2F2; color: #E02020; }
.category-card-icon { width: 52px; height: 52px; background: #F5F5F5; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #888; flex-shrink: 0; transition: all .2s; }

/* Hero stats strip */
.hero-stats { display: flex; justify-content: space-around; padding: 48px 0; }
.hero-stat { text-align: center; }
.hero-stat-num { display: block; font-size: 56px; font-weight: 800; color: #E02020; line-height: 1; }
.hero-stat-label { display: block; font-size: 18px; color: #555; margin-top: 10px; font-weight: 500; }
@media (max-width: 768px) {
  .hero-stats { flex-wrap: wrap; gap: 24px; padding: 24px 0; }
  .hero-stat { width: 45%; }
  .hero-stat-num { font-size: 32px; }
}

/* CTA banner */
.cta-banner { background: linear-gradient(135deg, #E02020 0%, #C41818 100%); border-radius: 14px; padding: 48px 40px; display: flex; align-items: center; justify-content: space-between; }

@media (max-width: 768px) {
  .section-block { padding: 24px; }
  .cta-banner { padding: 28px 24px; }
}

/* Dark Hero */
.hero-dark {
  position: relative; overflow: hidden; border-radius: 12px;
  background: url('image/hero_banner.png?v=2') 70% center / cover no-repeat, #0A0A0A;
  padding: 40px 56px; text-align: left; min-height: 400px;
  display: flex; align-items: center; justify-content: flex-start;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,.85) 0%, rgba(0,0,0,.7) 35%, rgba(0,0,0,.3) 65%, transparent 100%);
}
.hero-particles { position: absolute; inset: 0; pointer-events: none; }
.hero-spark {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,140,50,.9) 0%, rgba(224,32,32,.6) 50%, transparent 100%);
  animation: sparkle ease-in-out infinite alternate;
}
@keyframes sparkle {
  0% { transform: scale(0.5); opacity: 0.2; }
  100% { transform: scale(1.2); opacity: 1; }
}
.hero-content { position: relative; z-index: 2; max-width: 680px; margin: 0; }
.hero-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
.hero-tag { padding: 8px 20px; border-radius: 99px; border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.08); color: rgba(255,255,255,.9); font-size: 14px; font-weight: 500; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
.hero-badge {
  display: inline-block; padding: 6px 20px; border-radius: 99px;
  border: 1px solid rgba(224,32,32,.5); background: rgba(224,32,32,.2);
  color: #FFFFFF; font-size: 13px; font-weight: 700; letter-spacing: .1em; margin-bottom: 24px;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  text-shadow: 0 1px 4px rgba(0,0,0,.5);
}
.hero-title {
  font-size: 42px; font-weight: 800; color: #FFFFFF; line-height: 1.2; margin: 0 0 18px;
  text-shadow: 0 2px 8px rgba(0,0,0,.8), 0 4px 24px rgba(0,0,0,.5);
}
.hero-sub {
  font-size: 18px; color: rgba(255,255,255,.85); line-height: 1.6; margin: 0;
  text-shadow: 0 1px 6px rgba(0,0,0,.8), 0 2px 16px rgba(0,0,0,.5);
}
.btn-hero { padding: 16px 32px; font-size: 17px; border-radius: 10px; box-shadow: 0 4px 20px rgba(224,32,32,.3); }
.btn-hero:hover { box-shadow: 0 6px 28px rgba(224,32,32,.5); }
.btn-hero-outline {
  padding: 16px 32px; font-size: 17px; border-radius: 10px;
  background: transparent; border: 1px solid rgba(255,255,255,.25); color: rgba(255,255,255,.8);
  cursor: pointer; transition: all .2s;
}
.btn-hero-outline:hover { border-color: rgba(255,255,255,.5); color: #fff; background: rgba(255,255,255,.05); }
.hero-line {
  position: absolute; background: linear-gradient(90deg, transparent, rgba(224,32,32,.15), transparent);
  height: 1px; pointer-events: none;
}
.hero-line-1 { bottom: 30%; left: 0; right: 0; transform: rotate(-3deg); }
.hero-line-2 { top: 25%; left: 0; right: 0; transform: rotate(2deg); opacity: .5; }

@media (max-width: 768px) {
  .hero-dark { padding: 40px 24px; min-height: 280px; }
  .hero-title { font-size: 28px; }
  .hero-sub { font-size: 16px; }
  .btn-hero, .btn-hero-outline { padding: 14px 24px; font-size: 15px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── Helpers ──
const PhImg = ({ w = "100%", h = 120, label = "IMG", style = {} }) => (
  <div className="ph-img" style={{ width: w, height: h, ...style }}>{label}</div>
);

const WireBlock = ({ label, dashed, clickable, onClick, children }) => (
  <div className={`wire${dashed ? " dashed" : ""}${clickable || onClick ? " clickable" : ""}`} onClick={onClick}>
    {label && <div className="wire-label">{label}</div>}
    {children}
  </div>
);

const Skel = ({ w = "100%", title, thin }) => (
  <div className={`skel${title ? " title" : ""}${thin ? " thin" : ""}`} style={{ width: w }} />
);

const ContactForm = () => (
  <WireBlock label="Форма обратной связи">
    <div className="grid-2 gap-sm" style={{ maxWidth: 500 }}>
      <div className="form-field"><label>Имя</label><input disabled /></div>
      <div className="form-field"><label>Телефон</label><input disabled /></div>
      <div className="form-field"><label>Email</label><input disabled /></div>
      <div className="form-field"><label>Компания</label><input disabled /></div>
      <div className="form-field" style={{ gridColumn: "1 / -1" }}><label>Сообщение</label><textarea disabled /></div>
    </div>
    <div className="checkbox mt-2">
      <div className="checkbox-box" />
      <span className="text-xs text-gray">Согласие на обработку персональных данных</span>

const PageCatalog = ({ navigate }) => {
  const [openCat, setOpenCat] = useState(null);
  const [activeSub, setActiveSub] = useState(null);

  const filtered = activeSub
    ? products.filter(p => p.cat === activeSub)
    : openCat
      ? products.filter(p => p.catParent === openCat)
      : products;

  const activeSubName = activeSub
    ? catalogData.flatMap(c => c.sub).find(s => s.id === activeSub)?.name
    : openCat
      ? catalogData.find(c => c.id === openCat)?.name
      : null;

  return (
    <div className="stack">
      <div><div className="text-xl font-bold text-dark">Каталог продукции</div><div className="text-sm text-gray">Промышленное оборудование и материалы</div></div>
      <div style={{ display: "flex", gap: 24, alignItems: "flex-start" }}>
        <div className="catalog-sidebar">
          {catalogData.map(cat => (
            <div key={cat.id}>
              <button
                className={`catalog-cat-btn${openCat === cat.id ? " active" : ""}`}
                onClick={() => { setOpenCat(openCat === cat.id ? null : cat.id); setActiveSub(null); }}>
                <CatIcon type={cat.id} />
                {cat.name}
                <ChevronIcon open={openCat === cat.id} />
              </button>
              {openCat === cat.id && (
                <div className="catalog-sub-list">
                  {cat.sub.map(sub => (
                    <button key={sub.id}
                      className={`catalog-sub-btn${activeSub === sub.id ? " active" : ""}`}
                      onClick={() => setActiveSub(activeSub === sub.id ? null : sub.id)}>
                      {sub.name}
                    </button>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
        <div style={{ flex: 1 }}>
          <div className="catalog-breadcrumb">
            {!openCat && !activeSub ? (
              <span className="catalog-breadcrumb-current">Все категории</span>
            ) : (
              <>
                <span className="catalog-breadcrumb-home" onClick={() => { setOpenCat(null); setActiveSub(null); }}>Все категории</span>
                {openCat && (
                  <>
                    <span className="catalog-breadcrumb-sep">/</span>
                    {activeSub ? (
                      <span className="catalog-breadcrumb-home" onClick={() => setActiveSub(null)}>{catalogData.find(c => c.id === openCat)?.name}</span>
                    ) : (
                      <span className="catalog-breadcrumb-current">{catalogData.find(c => c.id === openCat)?.name}</span>
                    )}
                  </>
                )}
                {activeSub && (
                  <>
                    <span className="catalog-breadcrumb-sep">/</span>
                    <span className="catalog-breadcrumb-current">{catalogData.flatMap(c => c.sub).find(s => s.id === activeSub)?.name}</span>
                  </>
                )}
                <button className="catalog-breadcrumb-reset" onClick={() => { setOpenCat(null); setActiveSub(null); }}>&#x2715;</button>
              </>
            )}
          </div>
          {filtered.length > 0 ? (
            <div className="grid-3">
              {filtered.map(p => {
                const subName = catalogData.flatMap(c => c.sub).find(s => s.id === p.cat)?.name || "";
                return (
                  <div key={p.id} className="wire product-card">
                    <div className="product-info" onClick={() => navigate("product-detail")}>
                      <PhImg h={120} label="ФОТО ТОВАРА" />
                      <div className="mt-1"><span className="badge">{subName}</span></div>
                      <div className="text-sm font-medium text-dark product-name mt-1">{p.name}</div>
                      <Skel w="75%" /><Skel w="50%" thin />
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <div className="wire text-center" style={{ padding: "40px 16px", color: "#888" }}>
              <div className="text-sm">Товары в этой категории скоро появятся</div>
              <div className="text-xs text-gray mt-1">Свяжитесь с нами для уточнения наличия</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};
