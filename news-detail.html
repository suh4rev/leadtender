<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEADTENDER — Новость</title>
  <meta name="description" content="Новости компании LEADTENDER">
  <meta property="og:type" content="article">
  <link rel="icon" href="image/short-logo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/animations.css?v=2">

  <style>
    .detail-page-header {
      padding: 92px 0 32px;
      background: var(--color-bg);
    }

    /* === DETAIL CONTAINER === */
    .detail-container {
      max-width: 768px;
      margin: 0 auto;
    }
    .detail-date {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      background: var(--color-bg);
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 16px;
    }
    .detail-title {
      font-size: 36px;
      font-weight: 800;
      color: var(--color-text-primary);
      line-height: 1.2;
      margin-bottom: 32px;
    }
    .detail-cover {
      width: 100%;
      height: 360px;
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
    }
    .detail-cover svg {
      color: rgba(255,255,255,0.2);
    }

    /* === ARTICLE CONTENT === */
    .article-content {
      font-size: 16px;
      line-height: 1.8;
      color: var(--color-text-body);
    }
    .article-content p {
      margin-bottom: 20px;
    }
    .article-content h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-top: 36px;
      margin-bottom: 14px;
      line-height: 1.3;
    }
    .article-content strong {
      color: var(--color-text-primary);
      font-weight: 600;
    }

    /* === BACK LINK === */
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-body);
      text-decoration: none;
      margin-top: 48px;
      padding: 10px 0;
      transition: color var(--transition-fast);
    }
    .detail-back:hover {
      color: var(--color-primary);
    }

    /* === MORE SECTION === */
    .detail-more {
      border-top: 1px solid var(--color-border-light);
      padding-top: 48px;
      margin-top: 48px;
    }
    .detail-more-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 24px;
    }
    .detail-more-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .detail-more-card {
      background: var(--color-bg-white);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform var(--transition-base), box-shadow var(--transition-base);
    }
    .detail-more-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-card-hover);
    }
    .detail-more-card-img {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-more-card-img svg {
      color: rgba(255,255,255,0.2);
    }
    .detail-more-card-body {
      padding: 16px;
    }
    .detail-more-card-date {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-bottom: 6px;
    }
    .detail-more-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.4;
      transition: color var(--transition-fast);
    }
    .detail-more-card:hover .detail-more-card-title {
      color: var(--color-primary);
    }

    /* === NOT FOUND === */
    .detail-not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .detail-not-found svg {
      color: var(--color-text-muted);
      margin-bottom: 16px;
    }
    .detail-not-found p {
      font-size: 18px;
      color: var(--color-text-muted);
      margin-bottom: 24px;
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .detail-title { font-size: 28px; }
      .detail-cover { height: 240px; }
      .detail-more-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="scroll-progress" id="scroll-progress"></div>
  <div id="header" data-header-style="solid"></div>

  <div class="detail-page-header">
    <div class="container">
      <div class="detail-container">
        <nav class="breadcrumbs" id="detail-breadcrumbs" aria-label="Навигация">
          <a href="index.html">Главная</a>
          <span class="separator">/</span>
          <a href="news.html">Новости</a>
          <span class="separator">/</span>
          <span class="current" id="bc-title">Загрузка...</span>
        </nav>
      </div>
    </div>
  </div>

  <section class="section" style="padding-top: 0;">
    <div class="container">
      <div class="detail-container" id="detail-content">
        <!-- Rendered by JS -->
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <button class="back-to-top" id="back-to-top" aria-label="Наверх">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>

  <script>
    var NEWS_GRADIENTS = {
      1: 'linear-gradient(135deg, #DC2626, #991B1B)',
      2: 'linear-gradient(135deg, #1E293B, #334155)',
      3: 'linear-gradient(135deg, #0F172A, #1E293B)',
      4: 'linear-gradient(135deg, #374151, #4B5563)'
    };
    var NEWS_ICONS = {
      1: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
      2: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      3: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg>',
      4: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>'
    };

    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var id = parseInt(params.get('id'));
      var item = NEWS.find(function(n) { return n.id === id; });
      var container = document.getElementById('detail-content');
      var bcTitle = document.getElementById('bc-title');

      if (!item) {
        bcTitle.textContent = 'Не найдено';
        container.innerHTML =
          '<div class="detail-not-found">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>' +
            '<p>Новость не найдена</p>' +
            '<a href="news.html" class="btn btn-primary">Все новости</a>' +
          '</div>';
        return;
      }

      document.title = 'LEADTENDER — ' + item.title;
      bcTitle.textContent = item.title;

      var gradient = NEWS_GRADIENTS[item.id] || NEWS_GRADIENTS[1];
      var icon = NEWS_ICONS[item.id] || NEWS_ICONS[1];

      // Build other news
      var others = NEWS.filter(function(n) { return n.id !== item.id; });
      var othersHTML = '';
      others.forEach(function(n) {
        var g = NEWS_GRADIENTS[n.id] || NEWS_GRADIENTS[1];
        var ic = NEWS_ICONS[n.id] || NEWS_ICONS[1];
        othersHTML +=
          '<a href="news-detail.html?id=' + n.id + '" class="detail-more-card">' +
            '<div class="detail-more-card-img" style="background: ' + g + ';">' + ic.replace(/56/g, '32') + '</div>' +
            '<div class="detail-more-card-body">' +
              '<div class="detail-more-card-date">' + n.date + '</div>' +
              '<div class="detail-more-card-title">' + n.title + '</div>' +
            '</div>' +
          '</a>';
      });

      container.innerHTML =
        '<div class="detail-date" data-aos="fade-up">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> ' +
          item.date +
        '</div>' +
        '<h1 class="detail-title" data-aos="fade-up">' + item.title + '</h1>' +
        '<div class="detail-cover" style="background: ' + gradient + ';" data-aos="fade-up">' + icon + '</div>' +
        '<div class="article-content" data-aos="fade-up">' + item.content + '</div>' +
        '<a href="news.html" class="detail-back">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>' +
          'Все новости' +
        '</a>' +
        '<div class="detail-more" data-aos="fade-up">' +
          '<div class="detail-more-title">Другие новости</div>' +
          '<div class="detail-more-grid">' + othersHTML + '</div>' +
        '</div>';

      if (typeof AOS !== 'undefined') AOS.refresh();
    });
  </script>
</body>
</html>
