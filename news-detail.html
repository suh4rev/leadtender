<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEADTENDER — Новость</title>
  <meta name="description" content="Новости компании LEADTENDER">
  <meta property="og:type" content="article">
  <link rel="icon" href="image/short-logo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/animations.css?v=2">

  <style>
    .detail-page-header {
      padding: 92px 0 32px;
      background: var(--color-bg);
    }

    /* === DETAIL CONTAINER === */
    .detail-container {
      max-width: 768px;
      margin: 0 auto;
    }
    .detail-date {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      background: var(--color-bg);
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 16px;
    }
    .detail-title {
      font-size: 36px;
      font-weight: 800;
      color: var(--color-text-primary);
      line-height: 1.2;
      margin-bottom: 32px;
    }
    .detail-cover {
      width: 100%;
      height: 360px;
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
    }
    .detail-cover svg {
      color: rgba(255,255,255,0.2);
    }
    .detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: var(--radius-xl);
    }

    /* === ARTICLE CONTENT === */
    .article-content {
      font-size: 16px;
      line-height: 1.8;
      color: var(--color-text-body);
    }
    .article-content p {
      margin-bottom: 20px;
    }
    .article-content h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-top: 36px;
      margin-bottom: 14px;
      line-height: 1.3;
    }
    .article-content strong {
      color: var(--color-text-primary);
      font-weight: 600;
    }

    /* === BACK LINK === */
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-body);
      text-decoration: none;
      margin-top: 48px;
      padding: 10px 0;
      transition: color var(--transition-fast);
    }
    .detail-back:hover {
      color: var(--color-primary);
    }

    /* === MORE SECTION === */
    .detail-more {
      border-top: 1px solid var(--color-border-light);
      padding-top: 48px;
      margin-top: 48px;
    }
    .detail-more-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 24px;
    }
    .detail-more-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 340px);
      gap: 32px;
      justify-content: center;
    }
    .detail-more-card {
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform var(--transition-base);
    }
    .detail-more-card:hover {
      transform: translateY(-4px);
    }
    .detail-more-card-img {
      width: 100%;
      height: 200px;
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow var(--transition-base);
    }
    .detail-more-card:hover .detail-more-card-img {
      box-shadow: var(--shadow-card-hover);
    }
    .detail-more-card-img svg {
      color: rgba(255,255,255,0.3);
    }
    .detail-more-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .detail-more-card-body {
      padding: 0;
    }
    .detail-more-card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.4;
      margin-bottom: 8px;
      transition: color var(--transition-fast);
    }
    .detail-more-card:hover .detail-more-card-title {
      color: var(--color-primary);
    }
    .detail-more-card-date {
      font-size: 14px;
      color: var(--color-text-muted);
    }

    /* === NOT FOUND === */
    .detail-not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .detail-not-found svg {
      color: var(--color-text-muted);
      margin-bottom: 16px;
    }
    .detail-not-found p {
      font-size: 18px;
      color: var(--color-text-muted);
      margin-bottom: 24px;
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .detail-title { font-size: 28px; }
      .detail-cover { height: 240px; }
    }
    @media (max-width: 640px) {
      .detail-more-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="scroll-progress" id="scroll-progress"></div>
  <div id="header" data-header-style="solid"></div>

  <div class="detail-page-header">
    <div class="container">
      <div class="detail-container">
        <nav class="breadcrumbs" id="detail-breadcrumbs" aria-label="Навигация">
          <a href="index.html">Главная</a>
          <span class="separator">/</span>
          <a href="news.html">Новости</a>
          <span class="separator">/</span>
          <span class="current" id="bc-title">Загрузка...</span>
        </nav>
      </div>
    </div>
  </div>

  <section class="section" style="padding-top: 0;">
    <div class="container">
      <div class="detail-container" id="detail-content">
        <!-- Rendered by JS -->
      </div>
    </div>
  </section>

  <section class="section" style="padding-top: 0;" id="detail-more-section" hidden>
    <div class="container" id="detail-more-container">
      <!-- Other news rendered by JS -->
    </div>
  </section>

  <div id="footer"></div>

  <button class="back-to-top" id="back-to-top" aria-label="Наверх">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>

  <script>
    var NEWS_IMAGES = {
      1: 'image/disk_news.webp',
      2: 'image/tp_tc_news.webp',
      3: 'image/mpa_news.webp',
      4: 'image/site_news.webp',
      5: 'image/isoserts_news.webp',
      6: 'image/bkh_news.webp'
    };
    var NEWS_GRADIENTS = {};
    var NEWS_ICONS = {};

    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var id = parseInt(params.get('id'));
      var item = NEWS.find(function(n) { return n.id === id; });
      var container = document.getElementById('detail-content');
      var bcTitle = document.getElementById('bc-title');

      if (!item) {
        bcTitle.textContent = 'Не найдено';
        container.innerHTML =
          '<div class="detail-not-found">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>' +
            '<p>Новость не найдена</p>' +
            '<a href="news.html" class="btn btn-primary">Все новости</a>' +
          '</div>';
        return;
      }

      document.title = 'LEADTENDER — ' + item.title;
      bcTitle.textContent = item.title;

      // Build cover
      var coverHTML = '';
      if (NEWS_IMAGES[item.id]) {
        coverHTML = '<img src="' + NEWS_IMAGES[item.id] + '" alt="' + item.title + '">';
      } else {
        var icon = NEWS_ICONS[item.id] || '';
        coverHTML = icon;
      }
      var gradient = NEWS_GRADIENTS[item.id] || '';

      // Build other news
      var others = NEWS.filter(function(n) { return n.id !== item.id; });
      var othersHTML = '';
      others.forEach(function(n) {
        var cardImgHTML = '';
        if (NEWS_IMAGES[n.id]) {
          cardImgHTML = '<div class="detail-more-card-img"><img src="' + NEWS_IMAGES[n.id] + '" alt="' + n.title + '"></div>';
        } else {
          var g = NEWS_GRADIENTS[n.id] || '';
          var ic = NEWS_ICONS[n.id] || '';
          cardImgHTML = '<div class="detail-more-card-img" style="' + (g ? 'background:' + g + ';' : '') + '">' + ic.replace(/56/g, '40') + '</div>';
        }
        othersHTML +=
          '<a href="news-detail.html?id=' + n.id + '" class="detail-more-card">' +
            cardImgHTML +
            '<div class="detail-more-card-body">' +
              '<div class="detail-more-card-title">' + n.title + '</div>' +
              '<span class="detail-more-card-date">' + n.date + '</span>' +
            '</div>' +
          '</a>';
      });

      container.innerHTML =
        '<div class="detail-date" data-aos="fade-up">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> ' +
          item.date +
        '</div>' +
        '<h1 class="detail-title" data-aos="fade-up">' + item.title + '</h1>' +
        '<div class="detail-cover" style="' + (gradient ? 'background:' + gradient + ';' : '') + '" data-aos="fade-up">' + coverHTML + '</div>' +
        '<div class="article-content" data-aos="fade-up">' + item.content + '</div>' +
        '<a href="news.html" class="detail-back">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>' +
          'Все новости' +
        '</a>';

      // Render other news in separate wide container
      var moreSection = document.getElementById('detail-more-section');
      var moreContainer = document.getElementById('detail-more-container');
      moreSection.hidden = false;
      moreContainer.innerHTML =
        '<div class="detail-more" data-aos="fade-up">' +
          '<div class="detail-more-title">Другие новости</div>' +
          '<div class="detail-more-grid">' + othersHTML + '</div>' +
        '</div>';

      if (typeof AOS !== 'undefined') AOS.refresh();
    });
  </script>
</body>
</html>
