<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEADTENDER — Товар</title>
  <meta name="description" content="Карточка товара — LEADTENDER">
  <meta property="og:type" content="product">
  <link rel="icon" href="image/short-logo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/animations.css?v=2">

  <style>
    .product-page-header {
      padding: 92px 0 32px;
      background: var(--color-bg);
    }

    /* === PRODUCT LAYOUT === */
    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    /* Image */
    .product-image {
      height: 420px;
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 88px;
    }
    .product-image svg {
      color: rgba(255,255,255,0.2);
    }

    /* Info */
    .product-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .product-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--color-text-primary);
      line-height: 1.25;
    }
    .product-desc {
      font-size: 16px;
      color: var(--color-text-body);
      line-height: 1.7;
    }

    /* Section labels (unified) */
    .product-section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    /* Specs table */
    .product-specs {
      background: var(--color-bg-white);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .product-specs-table {
      width: 100%;
      border-collapse: collapse;
    }
    .product-specs-table tr {
      border-bottom: 1px solid var(--color-border-light);
    }
    .product-specs-table tr:last-child {
      border-bottom: none;
    }
    .product-specs-table tr:nth-child(even) {
      background: #F8FAFC;
    }
    .product-specs-table td {
      padding: 12px 20px;
      font-size: 14px;
      vertical-align: top;
    }
    .product-specs-table td:first-child {
      color: var(--color-text-muted);
      font-weight: 500;
      width: 45%;
    }
    .product-specs-table td:last-child {
      color: var(--color-text-primary);
      font-weight: 600;
    }

    /* Manufacturer card */
    .product-manufacturer {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: var(--color-bg-white);
      border: 1.5px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      text-decoration: none;
      color: inherit;
      transition: all var(--transition-base);
    }
    .product-manufacturer:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
      transform: translateY(-2px);
      box-shadow: var(--shadow-card-hover);
    }
    .product-manufacturer-avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }
    .product-manufacturer-info {
      flex: 1;
      min-width: 0;
    }
    .product-manufacturer-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-text-primary);
    }
    .product-manufacturer-sub {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .product-manufacturer-arrow {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-primary);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Documentation links */
    .product-docs {
      display: flex;
      flex-direction: column;
    }
    .product-doc {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--color-border-light);
      color: var(--color-text-body);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: color var(--transition-fast);
    }
    .product-doc:last-child { border-bottom: none; }
    .product-doc:hover { color: var(--color-primary); }
    .product-doc svg { color: var(--color-text-muted); flex-shrink: 0; transition: color var(--transition-fast); }
    .product-doc:hover svg { color: var(--color-primary); }

    /* Not found */
    .product-not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .product-not-found svg {
      color: var(--color-text-muted);
      margin-bottom: 16px;
    }
    .product-not-found p {
      font-size: 18px;
      color: var(--color-text-muted);
      margin-bottom: 24px;
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .product-layout {
        grid-template-columns: 1fr;
        gap: 24px;
      }
      .product-image {
        height: 240px;
        position: static;
      }
      .product-title {
        font-size: 22px;
      }
      .product-desc {
        font-size: 15px;
      }
      .product-specs-table td {
        padding: 10px 14px;
        font-size: 13px;
      }
      .product-specs-table td:first-child {
        width: 40%;
      }
      .product-manufacturer {
        padding: 16px;
      }
      .product-manufacturer-arrow {
        display: none;
      }
    }
    @media (max-width: 480px) {
      .product-image {
        height: 200px;
      }
      .product-title {
        font-size: 20px;
      }
      .product-specs-table td {
        display: block;
        width: 100% !important;
        padding: 6px 14px;
      }
      .product-specs-table td:first-child {
        padding-bottom: 0;
        font-size: 12px;
      }
      .product-specs-table td:last-child {
        padding-top: 2px;
        padding-bottom: 12px;
      }
      .product-specs-table tr {
        border-bottom: 1px solid var(--color-border-light);
      }
    }
  </style>
</head>
<body>

  <div class="scroll-progress" id="scroll-progress"></div>
  <div id="header" data-header-style="solid"></div>

  <div class="product-page-header">
    <div class="container">
      <nav class="breadcrumbs" id="product-breadcrumbs" aria-label="Навигация">
        <a href="index.html">Главная</a>
        <span class="separator">/</span>
        <a href="catalog.html">Продукция</a>
        <span class="separator">/</span>
        <span class="current" id="bc-title">Загрузка...</span>
      </nav>
    </div>
  </div>

  <section class="section" style="padding-top: 0;">
    <div class="container" id="product-content">
      <!-- Rendered by JS -->
    </div>
  </section>

  <div id="footer"></div>

  <button class="back-to-top" id="back-to-top" aria-label="Наверх">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>

  <script>
    var GRADIENTS = {
      'abrasive':  'linear-gradient(135deg, #DC2626, #991B1B)',
      'power':     'linear-gradient(135deg, #2563EB, #1E40AF)',
      'hand':      'linear-gradient(135deg, #059669, #047857)',
      'fasteners': 'linear-gradient(135deg, #475569, #334155)',
      'safety':    'linear-gradient(135deg, #D97706, #B45309)',
      'welding':   'linear-gradient(135deg, #1E293B, #0F172A)'
    };
    var CAT_ICONS = {
      'abrasive':  '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>',
      'power':     '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
      'hand':      '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
      'fasteners': '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>',
      'safety':    '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
      'welding':   '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>'
    };
    var PARTNER_COLORS = {
      'bkh': '#DC2626', 'interskol': '#2563EB', 'zubr': '#059669',
      'krepex': '#475569', 'sts': '#D97706', 'resanta': '#7C3AED'
    };

    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var id = parseInt(params.get('id'));
      var product = PRODUCTS.find(function(p) { return p.id === id; });
      var container = document.getElementById('product-content');
      var bcTitle = document.getElementById('bc-title');

      if (!product) {
        bcTitle.textContent = 'Не найдено';
        container.innerHTML =
          '<div class="product-not-found">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>' +
            '<p>Товар не найден</p>' +
            '<a href="catalog.html" class="btn btn-primary">Перейти в каталог</a>' +
          '</div>';
        return;
      }

      document.title = 'LEADTENDER — ' + product.name;
      bcTitle.textContent = product.name;

      // Find category & subcategory names
      var catName = '', subName = '';
      CATALOG_CATEGORIES.forEach(function(cat) {
        if (cat.id === product.catParent) {
          catName = cat.name;
          cat.sub.forEach(function(sub) {
            if (sub.id === product.cat) subName = sub.name;
          });
        }
      });

      // Find manufacturer
      var partner = PARTNERS.find(function(p) { return p.id === product.manufacturer; });
      var gradient = GRADIENTS[product.catParent] || GRADIENTS['abrasive'];
      var icon = CAT_ICONS[product.catParent] || CAT_ICONS['abrasive'];

      // Specs table
      var specsHTML = '';
      var keys = Object.keys(product.specs);
      keys.forEach(function(key) {
        specsHTML += '<tr><td>' + key + '</td><td>' + product.specs[key] + '</td></tr>';
      });

      // Manufacturer block
      var mfgHTML = '';
      if (partner) {
        var pColor = PARTNER_COLORS[partner.id] || '#94A3B8';
        var initial = partner.name.charAt(0);
        mfgHTML =
          '<a href="partner-detail.html?id=' + partner.id + '" class="product-manufacturer">' +
            '<div class="product-manufacturer-avatar" style="background: ' + (partner.logo ? '#fff; border: 1px solid #e5e5e5' : pColor) + ';">' +
              (partner.logo ? '<img src="' + partner.logo + '" alt="' + partner.name + '" style="width:80%; height:80%; object-fit:contain;">' : initial) +
            '</div>' +
            '<div class="product-manufacturer-info">' +
              '<div class="product-manufacturer-name">' + partner.name + '</div>' +
              '<div class="product-manufacturer-sub">' + partner.subtitle + ' · ' + partner.location + '</div>' +
            '</div>' +
            '<span class="product-manufacturer-arrow">Подробнее <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>' +
          '</a>';
      }

      // Update breadcrumbs with category
      var bc = document.getElementById('product-breadcrumbs');
      bc.innerHTML =
        '<a href="index.html">Главная</a><span class="separator">/</span>' +
        '<a href="catalog.html">Продукция</a><span class="separator">/</span>' +
        '<a href="catalog.html?cat=' + product.catParent + '">' + catName + '</a><span class="separator">/</span>' +
        '<span class="current">' + product.name + '</span>';

      container.innerHTML =
        '<div class="product-layout">' +
          '<div class="product-image" style="background: #fff; overflow: hidden;">' +
            (product.image ? '<img src="' + product.image + '" alt="' + product.name + '" style="width:100%; height:100%; object-fit:cover;">' : icon) +
          '</div>' +
          '<div class="product-info">' +
            '<span class="badge badge-primary">' + subName + '</span>' +
            '<h1 class="product-title">' + product.name + '</h1>' +
            '<p class="product-desc">' + product.description + '</p>' +
            '<div>' +
              '<div class="product-section-label">Характеристики</div>' +
              '<div class="product-specs">' +
                '<table class="product-specs-table"><tbody>' + specsHTML + '</tbody></table>' +
              '</div>' +
            '</div>' +
            (mfgHTML ? '<div><div class="product-section-label">Производитель</div>' + mfgHTML + '</div>' : '') +
            '<div>' +
              '<div class="product-section-label">Документация</div>' +
              '<div class="product-docs">' +
                '<a href="docs/declaration.pdf" target="_blank" class="product-doc">' +
                  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>' +
                  'Декларация соответствия ТР ТС' +
                '</a>' +
                '<a href="docs/MPA 115x1.2.pdf" target="_blank" class="product-doc">' +
                  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' +
                  'Протокол испытаний MPA Hannover (EN 12413)' +
                '</a>' +
                '<a href="docs/catalog-bkh.pdf" target="_blank" class="product-doc">' +
                  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg>' +
                  'Каталог продукции BKH' +
                '</a>' +
              '</div>' +
            '</div>' +
            '<a href="contacts.html#form" class="btn btn-primary btn-lg" style="border-radius:50px;width:fit-content;margin-top:8px;">Оставить заявку</a>' +
          '</div>' +
        '</div>';

      if (typeof AOS !== 'undefined') AOS.refresh();
    });
  </script>
</body>
</html>
