<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEADTENDER — Статья</title>
  <meta name="description" content="Полезная информация об абразивной продукции">
  <meta property="og:type" content="article">
  <link rel="icon" href="image/short-logo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/animations.css?v=2">

  <style>
    .detail-page-header {
      padding: 92px 0 32px;
      background: var(--color-bg);
    }

    .detail-container {
      max-width: 768px;
      margin: 0 auto;
    }
    .detail-date {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      background: var(--color-bg);
      padding: 6px 14px;
      border-radius: 50px;
      margin-bottom: 16px;
    }
    .detail-title {
      font-size: 36px;
      font-weight: 800;
      color: var(--color-text-primary);
      line-height: 1.2;
      margin-bottom: 32px;
    }

    /* === ARTICLE CONTENT === */
    .article-content {
      font-size: 16px;
      line-height: 1.8;
      color: var(--color-text-body);
    }
    .article-content p {
      margin-bottom: 20px;
    }
    .article-content h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-top: 36px;
      margin-bottom: 14px;
      line-height: 1.3;
    }
    .article-content strong {
      color: var(--color-text-primary);
      font-weight: 600;
    }

    /* === BACK LINK === */
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-body);
      text-decoration: none;
      margin-top: 48px;
      padding: 10px 0;
      transition: color var(--transition-fast);
    }
    .detail-back:hover {
      color: var(--color-primary);
    }

    /* === MORE SECTION === */
    .detail-more {
      border-top: 1px solid var(--color-border-light);
      padding-top: 48px;
      margin-top: 48px;
    }
    .detail-more-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 24px;
    }
    .detail-more-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .detail-more-article {
      display: flex;
      gap: 16px;
      padding: 20px;
      background: var(--color-bg-white);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: inherit;
      transition: transform var(--transition-base), box-shadow var(--transition-base);
    }
    .detail-more-article:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-card-hover);
    }
    .detail-more-article-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: white;
    }
    .detail-more-article-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: 1.4;
      transition: color var(--transition-fast);
    }
    .detail-more-article:hover .detail-more-article-title {
      color: var(--color-primary);
    }
    .detail-more-article-date {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    /* === NOT FOUND === */
    .detail-not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .detail-not-found svg {
      color: var(--color-text-muted);
      margin-bottom: 16px;
    }
    .detail-not-found p {
      font-size: 18px;
      color: var(--color-text-muted);
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .detail-title { font-size: 28px; }
      .detail-more-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="scroll-progress" id="scroll-progress"></div>
  <div id="header" data-header-style="solid"></div>

  <div class="detail-page-header">
    <div class="container">
      <div class="detail-container">
        <nav class="breadcrumbs" id="detail-breadcrumbs" aria-label="Навигация">
          <a href="index.html">Главная</a>
          <span class="separator">/</span>
          <a href="info.html">Информация</a>
          <span class="separator">/</span>
          <span class="current" id="bc-title">Загрузка...</span>
        </nav>
      </div>
    </div>
  </div>

  <section class="section" style="padding-top: 0;">
    <div class="container">
      <div class="detail-container" id="detail-content">
        <!-- Rendered by JS -->
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <button class="back-to-top" id="back-to-top" aria-label="Наверх">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>

  <script>
    var ARTICLE_ICONS = {
      'marking-cut-discs':  { color: '#DC2626', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>' },
      'marking-grind-discs': { color: '#2563EB', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>' },
      'types-cut-discs':    { color: '#059669', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>' },
      'types-grind-discs':  { color: '#D97706', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>' },
      'choose-disc':        { color: '#7C3AED', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' },
      'safety-discs':       { color: '#0F172A', svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' }
    };

    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      var item = ARTICLES.find(function(a) { return a.id === id; });
      var container = document.getElementById('detail-content');
      var bcTitle = document.getElementById('bc-title');

      if (!item) {
        bcTitle.textContent = 'Не найдено';
        container.innerHTML =
          '<div class="detail-not-found">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>' +
            '<p>Статья не найдена</p>' +
            '<a href="info.html" class="btn btn-primary">Все статьи</a>' +
          '</div>';
        return;
      }

      document.title = 'LEADTENDER — ' + item.title;
      bcTitle.textContent = item.title;

      // Build other articles
      var others = ARTICLES.filter(function(a) { return a.id !== item.id; }).slice(0, 4);
      var othersHTML = '';
      others.forEach(function(a) {
        var iconData = ARTICLE_ICONS[a.id] || { color: '#94A3B8', svg: '' };
        othersHTML +=
          '<a href="info-detail.html?id=' + a.id + '" class="detail-more-article">' +
            '<div class="detail-more-article-icon" style="background: ' + iconData.color + ';">' + iconData.svg + '</div>' +
            '<div>' +
              '<div class="detail-more-article-title">' + a.title + '</div>' +
              '<div class="detail-more-article-date">' + a.date + '</div>' +
            '</div>' +
          '</a>';
      });

      container.innerHTML =
        '<div class="detail-date" data-aos="fade-up">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> ' +
          'Обновлено: ' + item.date +
        '</div>' +
        '<h1 class="detail-title" data-aos="fade-up">' + item.title + '</h1>' +
        '<div class="article-content" data-aos="fade-up">' + item.content + '</div>' +
        '<a href="info.html" class="detail-back">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>' +
          'Все статьи' +
        '</a>' +
        '<div class="detail-more" data-aos="fade-up">' +
          '<div class="detail-more-title">Другие статьи</div>' +
          '<div class="detail-more-grid">' + othersHTML + '</div>' +
        '</div>';

      if (typeof AOS !== 'undefined') AOS.refresh();
    });
  </script>
</body>
</html>
