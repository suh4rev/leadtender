<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEADTENDER — Партнёры</title>
  <meta name="description" content="Партнёры и производители LEADTENDER. Работаем напрямую с заводами: ВКН, Интерскол, ЗУБР, КрепЭкс, СпецТехСнаб, Ресанта.">
  <meta property="og:title" content="LEADTENDER — Партнёры">
  <meta property="og:type" content="website">
  <link rel="icon" href="image/short-logo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/animations.css?v=2">

  <style>
    .partners-page-header {
      padding: 92px 0 40px;
      background: var(--color-bg);
    }
    .partners-page-header h1 {
      font-size: 42px;
      font-weight: 800;
      color: var(--color-text-primary);
      margin-top: 16px;
      line-height: 1.1;
    }
    .partners-page-header p {
      font-size: 18px;
      color: var(--color-text-body);
      margin-top: 12px;
    }

    /* === PARTNER CARDS === */
    .partners-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      max-width: 480px;
    }
    .partner-card {
      background: var(--color-bg-white);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform var(--transition-base), box-shadow var(--transition-base);
    }
    .partner-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-card-hover);
    }
    .partner-card-avatar {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: white;
      margin-bottom: 20px;
    }
    .partner-card-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 4px;
      transition: color var(--transition-fast);
    }
    .partner-card:hover .partner-card-name {
      color: var(--color-primary);
    }
    .partner-card-subtitle {
      font-size: 14px;
      color: var(--color-text-muted);
      margin-bottom: 12px;
    }
    .partner-card-location {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 12px;
    }
    .partner-card-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-primary);
      background: var(--color-primary-light);
      border-radius: 50px;
    }

    @media (max-width: 1024px) {
      .partners-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .partners-grid { grid-template-columns: 1fr; }
      .partners-page-header h1 { font-size: 32px; }
    }
  </style>
</head>
<body>

  <div class="scroll-progress" id="scroll-progress"></div>
  <div id="header" data-header-style="solid"></div>

  <div class="partners-page-header">
    <div class="container">
      <nav class="breadcrumbs" aria-label="Навигация">
        <a href="index.html">Главная</a>
        <span class="separator">/</span>
        <span class="current">Партнёры</span>
      </nav>
      <h1>Наши партнёры</h1>
      <p>Работаем напрямую с заводами-производителями — без посредников</p>
    </div>
  </div>

  <section class="section" style="padding-top: 0;">
    <div class="container">
      <div class="partners-grid" id="partners-grid" data-aos="fade-up">
        <!-- Rendered by JS -->
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <button class="back-to-top" id="back-to-top" aria-label="Наверх">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>

  <script>
    var PARTNER_COLORS = {
      'bkh': '#DC2626', 'interskol': '#2563EB', 'zubr': '#059669',
      'krepex': '#475569', 'sts': '#D97706', 'resanta': '#7C3AED'
    };

    document.addEventListener('DOMContentLoaded', function() {
      var grid = document.getElementById('partners-grid');
      var html = '';

      PARTNERS.forEach(function(p, i) {
        var color = PARTNER_COLORS[p.id] || '#94A3B8';
        var initial = p.name.charAt(0);
        var badgeHTML = p.badge ? '<span class="partner-card-badge">' + p.badge + '</span>' : '';

        html +=
          '<a href="partner-detail.html?id=' + p.id + '" class="partner-card">' +
            '<div class="partner-card-avatar" style="background: ' + (p.logo ? '#fff; border: 1px solid #e5e5e5' : color) + ';">' +
              (p.logo ? '<img src="' + p.logo + '" alt="' + p.name + '" style="width:80%; height:80%; object-fit:contain;">' : initial) +
            '</div>' +
            '<div class="partner-card-name">' + p.name + '</div>' +
            '<div class="partner-card-subtitle">' + p.subtitle + '</div>' +
            '<div class="partner-card-location">' +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
              p.location +
            '</div>' +
            badgeHTML +
          '</a>';
      });

      grid.innerHTML = html;
      if (typeof AOS !== 'undefined') AOS.refresh();
    });
  </script>
</body>
</html>
